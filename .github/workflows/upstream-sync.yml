name: Upstream Sync

# Tracks https://github.com/nullclaw/nullclaw (upstream source)
# and opens a PR against main whenever new commits appear upstream.
#
# The `upstream-sync` branch is the single source-of-truth mirror of
# upstream/main. It is never committed to directly; only this workflow
# updates it. A PR from upstream-sync -> main lets maintainers review
# and cherry-pick upstream changes on their own schedule.

on:
  push:
    branches: [main]      # run on every merge to main so check suites pass
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: https://github.com/nullclaw/nullclaw.git
  UPSTREAM_BRANCH: main

jobs:
  sync:
    name: Sync upstream -> upstream-sync branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # full history needed for merge-base checks
          token: ${{ secrets.ACTION_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream "$UPSTREAM_REPO"

      - name: Fetch upstream
        run: git fetch upstream "$UPSTREAM_BRANCH"

      - name: Get latest upstream release info
        id: upstream_release
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          # Remove protocol and domain
          REPO_PATH=$(echo "$UPSTREAM_REPO" | sed -E 's|.*github.com/||')
          # Remove .git suffix if present
          UPSTREAM_REPO_PATH=${REPO_PATH%.git}
          
          UPSTREAM_OWNER=$(echo "$UPSTREAM_REPO_PATH" | cut -d/ -f1)
          echo "upstream_owner=$UPSTREAM_OWNER" >> "$GITHUB_OUTPUT"
          echo "upstream_repo_path=$UPSTREAM_REPO_PATH" >> "$GITHUB_OUTPUT"

          # Get latest release tag from upstream
          LATEST_TAG=$(gh release list --repo "$UPSTREAM_REPO_PATH" --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')

          if [ -z "$LATEST_TAG" ]; then
            echo "No releases found."
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest upstream release: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Fetch the tag
          git fetch upstream "refs/tags/$LATEST_TAG"
          TAG_SHA=$(git rev-parse FETCH_HEAD^{commit})
          echo "tag_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "has_release=true" >> "$GITHUB_OUTPUT"

      - name: Check for existing upstream-sync PR
        id: check_pr
        if: steps.upstream_release.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          FORK_REPO="${{ github.repository }}"
          FORK_OWNER=$(echo "$FORK_REPO" | cut -d/ -f1)
          
          # Check for any PR with label "upstream-sync" that is not closed
          # Looking for PRs with base=main and the label
          echo "Checking for existing upstream-sync PR..."
          
          # First check if there's an open PR with the upstream-sync label
          EXISTING_PR=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${FORK_REPO}/pulls?state=open&base=main" \
            --jq '.[] | select(.head.ref == "upstream-sync") | .number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            # Check closed PRs too (might be still needed if not merged)
            EXISTING_PR=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${FORK_REPO}/pulls?state=closed&base=main" \
              --jq '.[] | select(.head.ref == "upstream-sync" and .merged_at == null) | .number' 2>/dev/null || echo "")
          fi
          
          if [ -n "$EXISTING_PR" ]; then
            echo "Found existing upstream-sync PR: #$EXISTING_PR"
            echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing upstream-sync PR found"
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare upstream-sync branch
        if: steps.upstream_release.outputs.has_release == 'true'
        run: |
          TAG_SHA="${{ steps.upstream_release.outputs.tag_sha }}"
          
          # Check if upstream-sync branch exists locally
          if git ls-remote --exit-code origin upstream-sync >/dev/null 2>&1; then
            echo "upstream-sync branch already exists"
            git fetch origin upstream-sync
            # Update from origin
            git checkout -B upstream-sync "origin/upstream-sync"
          else
            # Branch doesn't exist, fork from main
            echo "Creating upstream-sync branch from main"
            git checkout -B upstream-sync "origin/main"
          fi

      - name: Sync upstream main to upstream-sync branch
        if: steps.upstream_release.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          TAG_SHA="${{ steps.upstream_release.outputs.tag_sha }}"
          LATEST_TAG="${{ steps.upstream_release.outputs.latest_tag }}"
          FORK_REPO="${{ github.repository }}"
          FORK_OWNER=$(echo "$FORK_REPO" | cut -d/ -f1)
          
          # Get current main HEAD
          MAIN_SHA=$(git rev-parse "origin/main")
          echo "Current main HEAD: $MAIN_SHA"
          echo "Upstream release SHA: $TAG_SHA"
          
          # Try to merge upstream main into upstream-sync (on top of main)
          # First, ensure we're on upstream-sync with main as base
          git checkout -B upstream-sync "origin/main"
          
          # Try merge - this may have conflicts
          if git merge --no-commit --no-ff "$TAG_SHA" 2>&1; then
            # Merge succeeded without conflicts
            echo "Merge succeeded without conflicts"
            MERGE_CONFLICTS=false
          else
            # Merge has conflicts - abort and note them
            echo "Merge has conflicts - aborting merge"
            git merge --abort || true
            MERGE_CONFLICTS=true
          fi
          
          # Always create a commit with upstream content (even if merge conflicted)
          # Use read-tree to get exact upstream content
          UPSTREAM_TREE=$(git rev-parse "${TAG_SHA}^{tree}")
          git read-tree --reset -u "$UPSTREAM_TREE"
          
          # Add a marker file to indicate this sync includes main's local changes
          # This helps track what's been merged
          echo "# Upstream Sync Info" > SYNC_INFO.md
          echo "Last sync tag: $LATEST_TAG" >> SYNC_INFO.md
          echo "Tag SHA: $TAG_SHA" >> SYNC_INFO.md
          echo "Main SHA: $MAIN_SHA" >> SYNC_INFO.md
          echo "Sync timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> SYNC_INFO.md
          git add SYNC_INFO.md
          
          # Commit the sync
          if [ "$MERGE_CONFLICTS" = "true" ]; then
            git commit -m "chore: sync upstream $LATEST_TAG (with potential conflicts to resolve)"
          else
            git commit -m "chore: sync upstream release $LATEST_TAG"
          fi
          
          # Push the branch
          SYNC_HEAD=$(git rev-parse HEAD)
          git push origin upstream-sync --force
          
          echo "sync_head=$SYNC_HEAD" >> "$GITHUB_OUTPUT"
          echo "merge_conflicts=$MERGE_CONFLICTS" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.upstream_release.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
          LATEST_TAG: ${{ steps.upstream_release.outputs.latest_tag }}
          TAG_SHA: ${{ steps.upstream_release.outputs.tag_sha }}
          UPSTREAM_OWNER: ${{ steps.upstream_release.outputs.upstream_owner }}
          FORK_REPO: ${{ github.repository }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/upstream-sync.yml
        run: |
          FORK_OWNER=$(echo "$FORK_REPO" | cut -d/ -f1)
          PR_EXISTS="${{ steps.check_pr.outputs.pr_exists }}"
          MERGE_CONFLICTS="${{ steps.sync_upstream.outputs.merge_conflicts }}"
          
          # Collect release notes / commits
          BASE_SHA=$(git rev-parse "origin/main")
          LOG=$(git log --oneline --no-merges "$BASE_SHA..$TAG_SHA" | head -50)
          
          PR_TITLE="chore: sync upstream release $LATEST_TAG"
          
          # Build PR body
          PR_BODY_FILE=$(mktemp)
          {
            printf '## Upstream Sync: Release %s\n\n' "$LATEST_TAG"
            printf 'New release from [%s/nullclaw](https://github.com/%s/nullclaw).\n\n' "$UPSTREAM_OWNER" "$UPSTREAM_OWNER"
            printf '**Status:** '
            if [ "$MERGE_CONFLICTS" = "true" ]; then
              printf '⚠️ **Conflicts detected - manual resolution needed**\n\n'
              printf '> **Conflict Resolution Required:**\n'
              printf '> The upstream release contains changes that conflict with local modifications in `main`.\n'
              printf '> Please review the conflicts and resolve them before merging.\n\n'
            else
              printf '✅ Ready to merge\n\n'
            fi
            printf '**This PR merges:**\n'
            printf '- Local `main` branch changes\n'
            printf '- Upstream `%s` release\n\n' "$LATEST_TAG"
            printf '**Review workflow:**\n'
            printf '1. Check the diff for breaking changes.\n'
            printf '2. Resolve any conflicts if present.\n'
            printf '3. Merge when ready.\n\n'
            printf '**Release Tag:** `%s`\n' "$LATEST_TAG"
            printf '**Commit SHA:** `%s`\n\n' "$TAG_SHA"
            printf '<details>\n<summary>New upstream commits</summary>\n\n```\n'
            printf '%s\n' "$LOG"
            printf '```\n\n</details>\n\n---\n'
            printf '*Auto-generated by the [Upstream Sync](%s) workflow.*\n' "$WORKFLOW_URL"
          } > "$PR_BODY_FILE"

          if [ "$PR_EXISTS" = "true" ]; then
            # Update existing PR
            PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
            echo "Updating existing PR #$PR_NUMBER..."
            jq -n \
              --arg title "$PR_TITLE" \
              --rawfile body "$PR_BODY_FILE" \
              '{"title": $title, "body": $body}' | \
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${FORK_REPO}/pulls/${PR_NUMBER}" \
              --input - >/dev/null
              
            # Add comment about conflicts if present
            if [ "$MERGE_CONFLICTS" = "true" ]; then
              COMMENT_BODY="⚠️ **Merge Conflicts Detected**\n\nThe upstream release \`$LATEST_TAG\` has conflicts with local \`main\` branch changes that need to be resolved manually.\n\nPlease resolve the conflicts in the \`upstream-sync\` branch before merging this PR.\n\n*This comment is auto-generated by the upstream-sync workflow.*"
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/${FORK_REPO}/issues/${PR_NUMBER}/comments" \
                -f "body=$COMMENT_BODY" 2>/dev/null || true
            fi
          else
            # Create new PR
            echo "Creating new PR..."
            PR_RESPONSE=$(jq -n \
              --arg title "$PR_TITLE" \
              --rawfile body "$PR_BODY_FILE" \
              --arg head "${FORK_OWNER}:upstream-sync" \
              --arg base "main" \
              '{"title": $title, "body": $body, "head": $head, "base": $base}' | \
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${FORK_REPO}/pulls" \
              --input - \
              --jq '.number' 2>&1) || true
            
            if echo "$PR_RESPONSE" | grep -qE '^[0-9]+$'; then
              PR_NUMBER="$PR_RESPONSE"
              echo "Created PR #$PR_NUMBER"
              
              # Add label
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/${FORK_REPO}/issues/${PR_NUMBER}/labels" \
                -f "labels[]=upstream-sync" 2>/dev/null || true
                
              # Add conflicts label if needed
              if [ "$MERGE_CONFLICTS" = "true" ]; then
                gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${FORK_REPO}/issues/${PR_NUMBER}/labels" \
                  -f "labels[]=conflicts" 2>/dev/null || true
              fi
            else
              echo "Failed to create PR: $PR_RESPONSE"
              exit 1
            fi
          fi

          rm -f "$PR_BODY_FILE"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.upstream_release.outputs.has_release }}" = "true" ]; then
            echo "### Upstream sync complete" >> "$GITHUB_STEP_SUMMARY"
            echo "- Release: \`${{ steps.upstream_release.outputs.latest_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ steps.check_pr.outputs.pr_exists }}" = "true" ]; then
              echo "- Updated existing PR #${{ steps.check_pr.outputs.existing_pr }}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- Created new PR against \`main\`." >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ "${{ steps.sync_upstream.outputs.merge_conflicts }}" = "true" ]; then
              echo "- ⚠️ Merge conflicts detected - manual resolution needed" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "### No new upstream release" >> "$GITHUB_STEP_SUMMARY"
            echo "No new release found in upstream repository." >> "$GITHUB_STEP_SUMMARY"
          fi
