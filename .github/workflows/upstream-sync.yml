name: Upstream Sync

# Tracks https://github.com/nullclaw/nullclaw (upstream source)
# and opens a PR against main whenever new commits appear upstream.
#
# The `upstream-sync` branch is the single source-of-truth mirror of
# upstream/main. It is never committed to directly; only this workflow
# updates it. A PR from upstream-sync → main lets maintainers review
# and cherry-pick upstream changes on their own schedule.

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync upstream → upstream-sync branch
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPO: https://github.com/nullclaw/nullclaw.git
      UPSTREAM_BRANCH: main
      SYNC_BRANCH: upstream-sync

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # full history needed for merge-base checks
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream "$UPSTREAM_REPO"

      - name: Fetch upstream
        run: git fetch upstream "$UPSTREAM_BRANCH"

      - name: Check for new upstream commits
        id: diff_check
        run: |
          # Resolve HEAD of upstream branch
          UPSTREAM_SHA=$(git rev-parse "upstream/$UPSTREAM_BRANCH")
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          # Does our upstream-sync branch already exist on origin?
          if git ls-remote --exit-code origin "refs/heads/$SYNC_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$SYNC_BRANCH"
            SYNC_SHA=$(git rev-parse "origin/$SYNC_BRANCH")
          else
            # Brand-new sync branch; treat everything as new
            SYNC_SHA=""
          fi
          echo "sync_sha=$SYNC_SHA" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_SHA" = "$SYNC_SHA" ]; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits — nothing to do."
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            COUNT=$(git rev-list --count "${SYNC_SHA:+$SYNC_SHA..}upstream/$UPSTREAM_BRANCH" 2>/dev/null || echo "?")
            echo "New upstream commits detected (≈ $COUNT). Will update $SYNC_BRANCH."
          fi

      - name: Update upstream-sync branch
        if: steps.diff_check.outputs.has_new == 'true'
        run: |
          # Hard-reset (or create) the local sync branch to upstream HEAD.
          # This branch is a pure mirror — no fork-specific commits here.
          git checkout -B "$SYNC_BRANCH" "upstream/$UPSTREAM_BRANCH"
          git push origin "$SYNC_BRANCH" --force-with-lease

      - name: Collect upstream release notes
        if: steps.diff_check.outputs.has_new == 'true'
        id: notes
        run: |
          UPSTREAM_SHA="${{ steps.diff_check.outputs.upstream_sha }}"
          SYNC_SHA="${{ steps.diff_check.outputs.sync_sha }}"

          # Short log of new upstream commits (max 50 lines)
          if [ -n "$SYNC_SHA" ]; then
            LOG=$(git log --oneline --no-merges "$SYNC_SHA..$UPSTREAM_SHA" | head -50)
          else
            LOG=$(git log --oneline --no-merges "$UPSTREAM_SHA" | head -50)
          fi

          # Escape for multiline GitHub output
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.diff_check.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_SHA: ${{ steps.diff_check.outputs.upstream_sha }}
          LOG: ${{ steps.notes.outputs.log }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/upstream-sync.yml
        run: |
          SHORT_SHA="${UPSTREAM_SHA:0:7}"
          PR_TITLE="chore: sync upstream nullclaw/nullclaw@${SHORT_SHA}"

          # Write body to a temp file via heredoc so that arbitrary characters
          # in $LOG (double quotes, backticks, dollar signs, backslashes) cannot
          # break the shell string or inject unexpected expansions.
          PR_BODY_FILE=$(mktemp)
          cat > "$PR_BODY_FILE" <<EOF
## Upstream sync

New commits from [nullclaw/nullclaw](https://github.com/nullclaw/nullclaw) are available.
This PR merges branch \`upstream-sync\` (a direct mirror of upstream \`main\`) into \`main\`.

**Review workflow:**
1. Check the diff below for breaking changes, API renames, or conflicts with fork-specific patches.
2. Resolve any conflicts directly on the \`upstream-sync\` branch.
3. Merge when ready.

**Upstream HEAD:** \`${UPSTREAM_SHA}\`

<details>
<summary>New commits (newest first)</summary>

\`\`\`
${LOG}
\`\`\`

</details>

---
*Auto-generated by the [Upstream Sync](${WORKFLOW_URL}) workflow.*
EOF

          # Check whether an open PR for this branch already exists
          EXISTING_PR=$(gh pr list \
            --head "$SYNC_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR} with new title/body."
            gh pr edit "$EXISTING_PR" \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE"
          else
            echo "Opening new PR: $PR_TITLE"
            gh pr create \
              --head "$SYNC_BRANCH" \
              --base main \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE" \
              --label "upstream-sync" || \
            gh pr create \
              --head "$SYNC_BRANCH" \
              --base main \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE"
          fi

          rm -f "$PR_BODY_FILE"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff_check.outputs.has_new }}" = "true" ]; then
            echo "### Upstream sync complete" >> "$GITHUB_STEP_SUMMARY"
            echo "- Upstream HEAD: \`${{ steps.diff_check.outputs.upstream_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Branch \`upstream-sync\` updated and PR opened/updated against \`main\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No new upstream commits" >> "$GITHUB_STEP_SUMMARY"
            echo "Branch \`upstream-sync\` is already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
