name: Upstream Sync

# Tracks https://github.com/nullclaw/nullclaw (upstream source)
# and opens a PR against main whenever new commits appear upstream.
#
# The `upstream-sync` branch is the single source-of-truth mirror of
# upstream/main. It is never committed to directly; only this workflow
# updates it. A PR from upstream-sync -> main lets maintainers review
# and cherry-pick upstream changes on their own schedule.

on:
  push:
    branches: [main]      # run on every merge to main so check suites pass
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync upstream -> upstream-sync branch
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPO: https://github.com/nullclaw/nullclaw.git
      UPSTREAM_BRANCH: main

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # full history needed for merge-base checks
          token: ${{ secrets.ACTION_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream "$UPSTREAM_REPO"

      - name: Fetch upstream
        run: git fetch upstream "$UPSTREAM_BRANCH"

      - name: Check for new upstream release
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          # Extract upstream owner/repo
          # Remove protocol and domain
          REPO_PATH=$(echo "$UPSTREAM_REPO" | sed -E 's|.*github.com/||')
          # Remove .git suffix if present
          UPSTREAM_REPO_PATH=${REPO_PATH%.git}
          
          UPSTREAM_OWNER=$(echo "$UPSTREAM_REPO_PATH" | cut -d/ -f1)
          echo "upstream_owner=$UPSTREAM_OWNER" >> "$GITHUB_OUTPUT"
          echo "upstream_repo_path=$UPSTREAM_REPO_PATH" >> "$GITHUB_OUTPUT"

          # Get latest release tag from upstream
          LATEST_TAG=$(gh release list --repo "$UPSTREAM_REPO_PATH" --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')

          if [ -z "$LATEST_TAG" ]; then
            echo "No releases found."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest release: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Fetch the tag
          git fetch upstream "refs/tags/$LATEST_TAG"
          TAG_SHA=$(git rev-parse FETCH_HEAD)
          echo "tag_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"

          # Check if this tag is already merged into local main
          if git merge-base --is-ancestor "$TAG_SHA" "origin/main"; then
             echo "Tag $LATEST_TAG is already merged."
             echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
             echo "Tag $LATEST_TAG is new."
             echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if update needed
        if: steps.check_release.outputs.has_new == 'true'
        id: check_update
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
        run: |
          TAG_SHA="${{ steps.check_release.outputs.tag_sha }}"
          
          # Check if upstream-sync branch exists
          if git ls-remote --exit-code origin upstream-sync >/dev/null 2>&1; then
             git fetch origin upstream-sync
             SYNC_SHA=$(git rev-parse origin/upstream-sync)
          else
             SYNC_SHA=""
          fi
          
          # Check for existing PR
          EXISTING_PR=$(gh pr list --head "upstream-sync" --base main --state open --json number --jq '.[0].number')
          
          if [ "$TAG_SHA" = "$SYNC_SHA" ] && [ -n "$EXISTING_PR" ]; then
             echo "Already synced to $TAG_SHA with PR #$EXISTING_PR."
             echo "needed=false" >> "$GITHUB_OUTPUT"
          else
             echo "Update needed."
             echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect release notes
        if: steps.check_release.outputs.has_new == 'true' && steps.check_update.outputs.needed == 'true'
        id: notes
        run: |
          TAG_SHA="${{ steps.check_release.outputs.tag_sha }}"
          BASE_SHA=$(git rev-parse "origin/main")

          # Short log of new commits (max 50 lines)
          LOG=$(git log --oneline --no-merges "$BASE_SHA..$TAG_SHA" | head -50)

          # Escape for multiline GitHub output
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Sync release to branch
        if: steps.check_release.outputs.has_new == 'true' && steps.check_update.outputs.needed == 'true'
        run: |
          TAG_SHA="${{ steps.check_release.outputs.tag_sha }}"
          git checkout -B upstream-sync "$TAG_SHA"
          git push origin upstream-sync --force
          
          echo "Waiting for GitHub to update branch ref..."
          
          # Loop check for branch update
          for i in {1..10}; do
             REMOTE_SHA=$(git ls-remote origin upstream-sync | awk '{print $1}')
             if [ "$REMOTE_SHA" = "$TAG_SHA" ]; then
                echo "Branch updated successfully."
                break
             fi
             echo "Waiting... ($i/10)"
             sleep 5
          done
          
          if [ "$REMOTE_SHA" != "$TAG_SHA" ]; then
             echo "Error: Branch update failed or timed out."
             exit 1
          fi

      - name: Create or update PR
        if: steps.check_release.outputs.has_new == 'true' && steps.check_update.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_TOKEN }}
          LATEST_TAG: ${{ steps.check_release.outputs.latest_tag }}
          TAG_SHA: ${{ steps.check_release.outputs.tag_sha }}
          UPSTREAM_OWNER: ${{ steps.check_release.outputs.upstream_owner }}
          LOG: ${{ steps.notes.outputs.log }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/upstream-sync.yml
        run: |
          PR_TITLE="chore: sync upstream release $LATEST_TAG"

          # Write body to a temp file
          PR_BODY_FILE=$(mktemp)
          {
            printf '## Upstream Sync: Release %s\n\n' "$LATEST_TAG"
            printf 'New release from [%s/nullclaw](https://github.com/%s/nullclaw) is available.\n' "$UPSTREAM_OWNER" "$UPSTREAM_OWNER"
            printf 'This PR merges upstream tag `%s` into `main`.\n\n' "$LATEST_TAG"
            printf '**Review workflow:**\n'
            printf '1. Check the diff below for breaking changes.\n'
            printf '2. Resolve any conflicts directly on the `main` branch.\n'
            printf '3. Merge when ready.\n\n'
            printf '**Release Tag:** `%s`\n' "$LATEST_TAG"
            printf '**Commit SHA:** `%s`\n\n' "$TAG_SHA"
            printf '<details>\n<summary>New commits (newest first)</summary>\n\n```\n'
            printf '%s\n' "$LOG"
            printf '```\n\n</details>\n\n---\n'
            printf '*Auto-generated by the [Upstream Sync](%s) workflow.*\n' "$WORKFLOW_URL"
          } > "$PR_BODY_FILE"

          # Check for existing PR from upstream-sync branch
          EXISTING_PR=$(gh pr list --head "upstream-sync" --base main --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}."
            gh pr edit "$EXISTING_PR" \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE"
            PR_NUMBER="$EXISTING_PR"
          else
            echo "Opening new PR: $PR_TITLE"
            PR_URL=$(gh pr create \
              --head "upstream-sync" \
              --base main \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE" \
              --label "upstream-sync" || \
            gh pr create \
              --head "upstream-sync" \
              --base main \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          fi

          # Check for conflicts
          if [ -n "$PR_NUMBER" ]; then
            echo "Checking for merge conflicts in PR #$PR_NUMBER..."
            sleep 10
            MERGE_STATUS=$(gh pr view "$PR_NUMBER" --json mergeable --jq .mergeable)
            if [ "$MERGE_STATUS" = "CONFLICTING" ]; then
              echo "Merge conflicts detected."
              gh pr edit "$PR_NUMBER" --add-label "conflicts"
              gh pr comment "$PR_NUMBER" --body "Merge conflicts detected. Please use GitHub Copilot to resolve."
            fi
          fi

          rm -f "$PR_BODY_FILE"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_release.outputs.has_new }}" = "true" ]; then
            echo "### Upstream sync complete" >> "$GITHUB_STEP_SUMMARY"
            echo "- Release: \`${{ steps.check_release.outputs.latest_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- PR opened/updated against \`main\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No new upstream release" >> "$GITHUB_STEP_SUMMARY"
            echo "Branch \`main\` is already up to date with latest release." >> "$GITHUB_STEP_SUMMARY"
          fi
