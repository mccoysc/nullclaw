name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release_info.outputs.version }}
      title: ${{ steps.release_info.outputs.title }}
      tag: ${{ steps.release_info.outputs.tag }}
      prerelease: ${{ steps.release_info.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release info
        id: release_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          DATE=$(date -u +'%Y.%m.%d' | sed 's/\.0\([0-9]\)/.\1/g')
          DATE_ESCAPED="${DATE//./\\.}"
          EXISTING=$(gh release list --repo "${{ github.repository }}" --limit 200 --json tagName -q '.[].tagName' 2>/dev/null || true)
          SEQ=0
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^v${DATE_ESCAPED}\.([0-9]+)$ ]]; then
              N="${BASH_REMATCH[1]}"
              if (( N >= SEQ )); then
                SEQ=$((N + 1))
              fi
            fi
          done <<< "$EXISTING"
          VERSION="${DATE}.${SEQ}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "title=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.target }})
    needs: version
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-riscv64
            zig_target: riscv64-linux-musl
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            ext: ".exe"
          - os: ubuntu-latest
            target: wasm32-wasi
            zig_target: wasm32-wasi
            ext: ".wasm"
            disabled: true  # wasm release disabled by default; set to false to re-enable

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build ReleaseSmall
        if: ${{ matrix.disabled != true }}
        run: zig build -Doptimize=ReleaseSmall -Dversion=${{ needs.version.outputs.tag }} ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) || '' }}

      - name: Upload artifact
        if: ${{ matrix.disabled != true }}
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-${{ matrix.target }}
          path: zig-out/bin/nullclaw${{ matrix.ext }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Rename binaries
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mv nullclaw-linux-x86_64/nullclaw   nullclaw-${VERSION}-linux-x86_64.bin
          mv nullclaw-linux-aarch64/nullclaw  nullclaw-${VERSION}-linux-aarch64.bin
          mv nullclaw-linux-riscv64/nullclaw  nullclaw-${VERSION}-linux-riscv64.bin
          mv nullclaw-macos-aarch64/nullclaw  nullclaw-${VERSION}-macos-aarch64.bin
          mv nullclaw-macos-x86_64/nullclaw   nullclaw-${VERSION}-macos-x86_64.bin
          mv nullclaw-windows-x86_64/nullclaw.exe  nullclaw-${VERSION}-windows-x86_64.exe
          mv nullclaw-windows-aarch64/nullclaw.exe nullclaw-${VERSION}-windows-aarch64.exe
          [ -d "nullclaw-wasm32-wasi" ] && mv nullclaw-wasm32-wasi/nullclaw.wasm nullclaw-${VERSION}-wasm32-wasi.wasm || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.title }}
          prerelease: ${{ needs.version.outputs.prerelease }}
          files: |
            nullclaw-${{ needs.version.outputs.version }}-linux-x86_64.bin
            nullclaw-${{ needs.version.outputs.version }}-linux-aarch64.bin
            nullclaw-${{ needs.version.outputs.version }}-linux-riscv64.bin
            nullclaw-${{ needs.version.outputs.version }}-macos-aarch64.bin
            nullclaw-${{ needs.version.outputs.version }}-macos-x86_64.bin
            nullclaw-${{ needs.version.outputs.version }}-windows-x86_64.exe
            nullclaw-${{ needs.version.outputs.version }}-windows-aarch64.exe
            nullclaw-${{ needs.version.outputs.version }}-wasm32-wasi.wasm
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
