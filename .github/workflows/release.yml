name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  generate-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CalVer tag
        id: calver
        run: |
          PREFIX="v$(date -u +%Y.%-m.%-d)"
          LAST=$(git tag -l "${PREFIX}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LAST" ]; then
            TAG="${PREFIX}.0"
          else
            N="${LAST##*.}"
            TAG="${PREFIX}.$((N + 1))"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Create and push tag
        env:
          TAG: ${{ steps.calver.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  build:
    name: Build (${{ matrix.target }})
    needs: [generate-tag]
    if: always() && (needs.generate-tag.result == 'success' || needs.generate-tag.result == 'skipped')
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-riscv64
            zig_target: riscv64-linux-musl
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            ext: ""
          - os: ubuntu-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            ext: ".exe"
          - os: ubuntu-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            ext: ".exe"
          # wasm32-wasi: disabled; add back here to re-enable wasm release

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build ReleaseSmall
        env:
          VERSION: ${{ needs.generate-tag.outputs.tag || github.ref_name }}
        run: zig build -Doptimize=ReleaseSmall -Dversion="$VERSION" ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-${{ matrix.target }}
          path: zig-out/bin/nullclaw${{ matrix.ext }}

  release:
    needs: [generate-tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Rename binaries
        env:
          VERSION: ${{ needs.generate-tag.outputs.tag || github.ref_name }}
        run: |
          mv nullclaw-linux-x86_64/nullclaw   "nullclaw-${VERSION}-linux-x86_64.bin"
          mv nullclaw-linux-aarch64/nullclaw  "nullclaw-${VERSION}-linux-aarch64.bin"
          mv nullclaw-linux-riscv64/nullclaw  "nullclaw-${VERSION}-linux-riscv64.bin"
          mv nullclaw-macos-aarch64/nullclaw  "nullclaw-${VERSION}-macos-aarch64.bin"
          mv nullclaw-macos-x86_64/nullclaw   "nullclaw-${VERSION}-macos-x86_64.bin"
          mv nullclaw-windows-x86_64/nullclaw.exe  "nullclaw-${VERSION}-windows-x86_64.exe"
          mv nullclaw-windows-aarch64/nullclaw.exe "nullclaw-${VERSION}-windows-aarch64.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.generate-tag.outputs.tag || github.ref_name }}
          files: |
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-linux-x86_64.bin
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-linux-aarch64.bin
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-linux-riscv64.bin
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-macos-aarch64.bin
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-macos-x86_64.bin
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-windows-x86_64.exe
            nullclaw-${{ needs.generate-tag.outputs.tag || github.ref_name }}-windows-aarch64.exe
          generate_release_notes: true

  docker:
    needs: [generate-tag, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.generate-tag.outputs.tag || github.ref_name }}
            type=raw,value=latest

      - name: Verify build context
        run: ls -la vendor/ && ls -la vendor/websocket/

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
